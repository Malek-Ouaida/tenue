services:
  postgres:
    image: postgres:16-alpine
    container_name: tenue-postgres
    environment:
      POSTGRES_USER: tenue
      POSTGRES_PASSWORD: tenue
      POSTGRES_DB: tenue
    ports:
      - "5433:5432"
    volumes:
      - tenue_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenue -d tenue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tenue-redis
    ports:
      - "6380:6379"
    volumes:
      - tenue_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  minio:
    image: minio/minio:RELEASE.2024-12-13T22-19-12Z
    container_name: tenue-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tenue}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tenue-tenue}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tenue_minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: tenue-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -lc "
      mc alias set local http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD &&
      mc mb -p local/$S3_BUCKET || true &&
      mc anonymous set download local/$S3_BUCKET || true &&
      echo '✅ MinIO bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tenue}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tenue-tenue}
      S3_BUCKET: ${S3_BUCKET:-tenue}

volumes:
  tenue_pg_data:
  tenue_redis_data:
  tenue_minio_data:
